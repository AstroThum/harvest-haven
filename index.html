<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harvest Haven — Farming RPG</title>
    <meta name="description" content="A Stardew Valley-inspired 2D top-down farming RPG built with Phaser 3">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        #game-container {
            width: 800px;
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(90, 140, 62, 0.25), 0 0 80px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Phaser 3 from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <!-- Game Logic -->
    <script src="game.js"></script>
</body>
</html>
